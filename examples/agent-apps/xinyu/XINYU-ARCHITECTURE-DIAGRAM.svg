<?xml version="1.0" encoding="UTF-8"?>
<svg width="1800" height="1240" viewBox="0 0 1800 1240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">心玉 XinYu 当前架构图</title>
  <desc id="desc">Verified on 2026-04-29. Current chain: NapCatQQ to native QQ gateway to XinYu core bridge to KohakuTerrarium runtime. AstrBot is not in the active path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="55%" stop-color="#f4f8f4"/>
      <stop offset="100%" stop-color="#fff7ee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#233040" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="softArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .page-title { font: 800 44px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #475569; }
      .section-title { font: 800 24px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .node-title { font: 800 18px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #111827; }
      .node-text { font: 500 14px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #334155; }
      .small { font: 500 12px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .tag { font: 800 12px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .panel { fill: rgba(255,255,255,0.78); stroke: #d8e1ea; stroke-width: 1.2; rx: 22; filter: url(#shadow); }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 14; }
      .node-blue { fill: #eef6ff; stroke: #8bc2f4; stroke-width: 1.4; rx: 14; }
      .node-green { fill: #effaf3; stroke: #85c99b; stroke-width: 1.4; rx: 14; }
      .node-amber { fill: #fff6e8; stroke: #f0b85c; stroke-width: 1.4; rx: 14; }
      .node-red { fill: #fff1f2; stroke: #f0a3ad; stroke-width: 1.4; rx: 14; }
      .node-violet { fill: #f5f3ff; stroke: #b9a7f5; stroke-width: 1.4; rx: 14; }
      .line { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .soft-line { fill: none; stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#softArrow); }
      .label-box { fill: #ffffff; stroke: #d8e1ea; stroke-width: 1; rx: 8; }
      .divider { stroke: #d8e1ea; stroke-width: 1; stroke-dasharray: 5 6; }
    </style>
  </defs>

  <rect width="1800" height="1240" fill="url(#bg)"/>
  <text x="70" y="74" class="page-title">心玉 XinYu 当前架构图</text>
  <text x="72" y="110" class="subtitle">核实时间：2026-04-29｜运行链路：NapCatQQ → xinyu_qq_gateway.py → xinyu_core_bridge.py → KohakuTerrarium agent runtime</text>
  <text x="72" y="137" class="subtitle">核心原则：人格文件稳定优先，外部输入先过网关和注入预算，学习/主动性只走受控边界。</text>

  <!-- Top live path -->
  <rect x="50" y="175" width="1700" height="360" class="panel"/>
  <text x="82" y="218" class="section-title">在线消息主路径</text>

  <rect x="85" y="260" width="245" height="92" class="node-blue"/>
  <text x="110" y="291" class="node-title">QQ 用户输入</text>
  <text x="110" y="320" class="node-text">owner 私聊 / 白名单</text>
  <text x="110" y="344" class="node-text">群聊：提及或前缀触发</text>

  <rect x="85" y="385" width="245" height="92" class="node"/>
  <text x="110" y="416" class="node-title">群被动观察</text>
  <text x="110" y="445" class="node-text">非触发消息不进入回复链</text>
  <text x="110" y="469" class="node-text">避免群记忆污染 owner 关系</text>

  <rect x="390" y="277" width="275" height="140" class="node-blue"/>
  <text x="418" y="311" class="node-title">NapCatQQ</text>
  <text x="418" y="342" class="node-text">WebUI: 127.0.0.1:6099</text>
  <text x="418" y="366" class="node-text">OneBot reverse WebSocket</text>
  <text x="418" y="390" class="node-text">连到 gateway /ws</text>

  <rect x="735" y="250" width="330" height="195" class="node-green"/>
  <text x="765" y="284" class="node-title">Native QQ Gateway</text>
  <text x="765" y="310" class="small">examples/agent-apps/xinyu/xinyu_qq_gateway.py</text>
  <text x="765" y="342" class="node-text">v0.1.0｜监听 127.0.0.1:6199/ws</text>
  <text x="765" y="366" class="node-text">鉴权 / 白名单 / owner 识别</text>
  <text x="765" y="390" class="node-text">群触发、命令过滤、回复截断</text>
  <text x="765" y="414" class="node-text">归一化 payload 后 POST /chat</text>

  <rect x="1135" y="225" width="380" height="245" class="node-amber"/>
  <text x="1165" y="259" class="node-title">XinYu Core Bridge</text>
  <text x="1165" y="285" class="small">examples/agent-apps/xinyu/xinyu_core_bridge.py</text>
  <text x="1165" y="317" class="node-text">v0.8.16｜HTTP 127.0.0.1:8765</text>
  <text x="1165" y="341" class="node-text">/health /probe /chat /proactive</text>
  <text x="1165" y="365" class="node-text">/learning/* /codex/execute</text>
  <text x="1165" y="389" class="node-text">session 管理、live 注入、voice 终检</text>
  <text x="1165" y="413" class="node-text">事件侧写、人格侧写、渲染器开关</text>
  <text x="1165" y="437" class="node-text">v1 shadow 只观测，不接管输出</text>

  <rect x="1570" y="278" width="135" height="138" class="node-violet"/>
  <text x="1593" y="312" class="node-title">API 边界</text>
  <text x="1593" y="342" class="node-text">本机端口</text>
  <text x="1593" y="366" class="node-text">token 可选</text>
  <text x="1593" y="390" class="node-text">日志隔离</text>

  <path d="M330 306 C350 306 365 306 390 320" class="line"/>
  <path d="M330 430 C355 430 365 405 390 380" class="soft-line"/>
  <path d="M665 347 L735 347" class="line"/>
  <path d="M1065 347 L1135 347" class="line"/>
  <path d="M1515 347 L1570 347" class="soft-line"/>
  <rect x="675" y="319" width="50" height="26" class="label-box"/>
  <text x="686" y="337" class="tag">WS</text>
  <rect x="1075" y="319" width="50" height="26" class="label-box"/>
  <text x="1083" y="337" class="tag">HTTP</text>

  <!-- Runtime and internal contracts -->
  <rect x="50" y="575" width="1700" height="360" class="panel"/>
  <text x="82" y="618" class="section-title">Agent Runtime、人格和记忆层</text>

  <rect x="85" y="665" width="335" height="210" class="node-violet"/>
  <text x="115" y="699" class="node-title">KohakuTerrarium Runtime</text>
  <text x="115" y="725" class="small">config.yaml + src/kohaku/*</text>
  <text x="115" y="757" class="node-text">system prompt 与 context_files 组装</text>
  <text x="115" y="781" class="node-text">tools: read/write/scratchpad/schedule</text>
  <text x="115" y="805" class="node-text">subagents: memory_read / memory_write</text>
  <text x="115" y="829" class="node-text">插件按 budget 与 sidecar 状态注入</text>
  <text x="115" y="853" class="node-text">输出再经 core bridge 终检</text>

  <rect x="470" y="645" width="335" height="120" class="node-amber"/>
  <text x="500" y="679" class="node-title">稳定人格基座</text>
  <text x="500" y="710" class="node-text">self_core / self_personality / voice_profile</text>
  <text x="500" y="734" class="node-text">owner、关系、生活锚点、口吻边界</text>

  <rect x="470" y="795" width="335" height="120" class="node-green"/>
  <text x="500" y="829" class="node-title">动态上下文</text>
  <text x="500" y="860" class="node-text">emotion_current / recent_interactions</text>
  <text x="500" y="884" class="node-text">turn residue / life posture / month context</text>

  <rect x="855" y="645" width="345" height="120" class="node-blue"/>
  <text x="885" y="679" class="node-title">事件与侧写</text>
  <text x="885" y="710" class="node-text">dialogue event sourcing、persona surface</text>
  <text x="885" y="734" class="node-text">runtime state、trace log、pending refs</text>

  <rect x="855" y="795" width="345" height="120" class="node"/>
  <text x="885" y="829" class="node-title">学习与来源闸门</text>
  <text x="885" y="860" class="node-text">study_material / source registry / growth</text>
  <text x="885" y="884" class="node-text">学习不直接改稳定人格文件</text>

  <rect x="1250" y="645" width="430" height="270" class="node-red"/>
  <text x="1280" y="679" class="node-title">人格保护边界</text>
  <text x="1280" y="710" class="node-text">1. 外部输入先经过 gateway 与 core bridge</text>
  <text x="1280" y="738" class="node-text">2. 主动性受 life posture、budget、cooldown 限制</text>
  <text x="1280" y="766" class="node-text">3. 群消息只在触发条件下进入回复链</text>
  <text x="1280" y="794" class="node-text">4. source/learning 写入受门控，不越权改 self</text>
  <text x="1280" y="822" class="node-text">5. v1 shadow 不覆盖现有人格与输出</text>
  <text x="1280" y="850" class="node-text">6. ignored runtime memory 不作为发布资产</text>
  <text x="1280" y="878" class="node-text">当前主动门控状态：life_posture_blocks_proactive</text>

  <path d="M1325 470 C1325 540 260 545 260 665" class="line"/>
  <path d="M420 744 L470 715" class="soft-line"/>
  <path d="M420 805 L470 855" class="soft-line"/>
  <path d="M805 705 L855 705" class="soft-line"/>
  <path d="M805 855 L855 855" class="soft-line"/>
  <path d="M1200 705 L1250 705" class="soft-line"/>
  <path d="M1200 855 L1250 855" class="soft-line"/>

  <!-- Autonomy, validation, boundaries -->
  <rect x="50" y="975" width="1700" height="205" class="panel"/>
  <text x="82" y="1018" class="section-title">主动性、运维验证和已移除链路</text>

  <rect x="85" y="1050" width="360" height="90" class="node-green"/>
  <text x="115" y="1083" class="node-title">主动循环与维护</text>
  <text x="115" y="1112" class="node-text">initiative / inner_cycle / dream / archive</text>
  <text x="115" y="1136" class="node-text">maintenance_schedule_bridge_plugin 统一调度</text>

  <rect x="495" y="1050" width="360" height="90" class="node-amber"/>
  <text x="525" y="1083" class="node-title">主动消息出口</text>
  <text x="525" y="1112" class="node-text">presence claim / ack / one_short_message</text>
  <text x="525" y="1136" class="node-text">/proactive → gateway → QQ，受 gate 阻断</text>

  <rect x="905" y="1050" width="335" height="90" class="node-blue"/>
  <text x="935" y="1083" class="node-title">验证与状态</text>
  <text x="935" y="1112" class="node-text">xinyu_status.py、runtime_readiness_smoke.py</text>
  <text x="935" y="1136" class="node-text">smoke_run.py --group voice / pytest tests</text>

  <rect x="1290" y="1050" width="390" height="90" class="node-red"/>
  <text x="1320" y="1083" class="node-title">不在当前主链路</text>
  <text x="1320" y="1112" class="node-text">AstrBot、旧 QQ 插件、直接人格热改</text>
  <text x="1320" y="1136" class="node-text">未授权 source → self_personality 写入</text>

  <path d="M1465 915 C1465 965 265 960 265 1050" class="soft-line"/>
  <path d="M445 1095 L495 1095" class="line"/>
  <path d="M855 1095 L905 1095" class="soft-line"/>
  <path d="M1240 1095 L1290 1095" class="soft-line"/>

  <line x1="60" y1="555" x2="1740" y2="555" class="divider"/>
  <line x1="60" y1="955" x2="1740" y2="955" class="divider"/>

  <text x="70" y="1210" class="small">Verified inputs: xinyu_status.py --json, RUNBOOK.md, DEPLOYMENT-STATUS-RUNBOOK.md, README.md, config.yaml, xinyu_core_bridge.py, xinyu_qq_gateway.py.</text>
</svg>
