name: XinYu Bug Report
description: Report a XinYu runtime, bridge, memory, or QQ integration issue
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not paste private memory, QQ ids, API keys, or full runtime logs.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: XinYu did not...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - XinYu core
        - Core bridge
        - Proactive QQ dispatch
        - Native QQ gateway
        - NapCat / OneBot connection
        - AI self-iteration review
        - Memory / reflection / dream state
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands when possible.
      placeholder: |
        1. Run `python xinyu_status.py`
        2. Start ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: status
    attributes:
      label: Status output
      description: Paste the relevant sanitized output from `python xinyu_status.py`.
      render: text

  - type: textarea
    id: logs
    attributes:
      label: Relevant sanitized logs
      description: Remove private memory, QQ ids, tokens, and API keys before pasting.
      render: text

  - type: input
    id: os
    attributes:
      label: OS / Platform
      placeholder: "Windows 11"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13"
