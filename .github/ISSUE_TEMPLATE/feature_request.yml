name: XinYu Feature Request
description: Suggest an improvement for XinYu
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What should XinYu become better at?
      placeholder: I want XinYu to...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Long-run stability
        - Memory review
        - Proactive QQ behavior
        - Native QQ gateway / NapCat integration
        - AI self-iteration review
        - Voice / personality calibration
        - Operator tooling
        - Documentation
        - Repository structure
        - Other
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired behavior or workflow.
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Privacy or safety boundary
      description: Note any memory, QQ, permission, or owner-approval concerns.

  - type: textarea
    id: validation
    attributes:
      label: How should this be validated?
      description: Mention smoke tests, status checks, or manual checks that would prove it works.
