name: Security

# Non-blocking supply-chain scans (Phase 4 start).
# Keep continue-on-error until findings are triaged and noise is low.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Weekly Monday ~06:17 UTC (off the hour to reduce fleet pile-up)
    - cron: "17 6 * * 1"
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Informational: Python dependency audit (XinYu-Core) ───────────────────
  pip-audit:
    name: "pip-audit XinYu-Core (informational)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: XinYu-Core/pyproject.toml
      - name: Install runtime + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e "./XinYu-Core[dev]"
          python -m pip install "pip-audit>=2.7.0"
      - name: Run pip-audit against installed environment
        run: |
          # Job is continue-on-error; capture exit for the summary only.
          set +e
          python -m pip_audit --progress-spinner off
          code=$?
          {
            echo "## pip-audit"
            echo "exit_code=$code"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$code"

  # ── Informational: npm audit (desktop shell) ──────────────────────────────
  npm-audit:
    name: "npm audit XinYu_Desktop (informational)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: XinYu_Desktop/package-lock.json
      - name: Install desktop deps
        working-directory: XinYu_Desktop
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: npm audit (non-blocking)
        working-directory: XinYu_Desktop
        run: |
          # Job is continue-on-error; high+ findings surface without bricking CI.
          set +e
          npm audit --audit-level=high
          code=$?
          {
            echo "## npm audit"
            echo "exit_code=$code"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$code"
