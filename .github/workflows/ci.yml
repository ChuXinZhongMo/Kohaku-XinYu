name: CI

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    shell: bash

env:
  XINYU_APP_DIR: XinYu-Core/examples/agent-apps/xinyu
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Blocking: unit/integration tests that do not need a live QQ/NapCat env ──
  python-tests:
    name: "Python tests (blocking)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: XinYu-Core/pyproject.toml
      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./XinYu-Core[dev]"
      - name: Install ripgrep (tests that shell out to rg)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
      - name: Run XinYu app test suite
        working-directory: ${{ env.XINYU_APP_DIR }}
        # optional deps (markitdown / torch) are absent -> those tests skip cleanly
        # Force Asia/Shanghai so tests that hardcode +08:00 match CI timestamps.
        env:
          TZ: Asia/Shanghai
        run: >
          python -m pytest -q -m "not smoke"
          --cov=.
          --cov-report=term-missing:skip-covered
          --cov-report=xml:coverage.xml
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: ${{ env.XINYU_APP_DIR }}/coverage.xml
          if-no-files-found: ignore

  # ── Blocking: critical correctness lint on core + app ───────────────────────
  # Full expanded ruff remains informational (style debt). Critical = F/E9 class.
  # Progressive plan: docs/plans/ENGINEERING-MATURITY-PLAN.md
  python-lint-critical:
    name: "Python lint critical (blocking)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.9.0"
      - name: Ruff critical rules on XinYu-Core/src
        run: ruff check XinYu-Core/src --select F,E9,F63,F7,F82
      - name: Ruff critical rules on xinyu app
        run: >
          ruff check "${{ env.XINYU_APP_DIR }}"
          --select F,E9,F63,F7,F82
          --exclude "**/learning/**,**/runtime/**,**/.venv/**,**/ops/archive/**"

  # ── Informational: full expanded ruff on core ──────────────────────────────
  python-lint-core-full:
    name: "Python lint core full (informational)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.9.0"
      - name: Ruff full config on XinYu-Core/src
        run: ruff check XinYu-Core/src

  # ── Informational: full expanded ruff on app ───────────────────────────────
  python-lint-app-full:
    name: "Python lint app full (informational)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.9.0"
      - name: Ruff full config on xinyu app
        run: >
          ruff check "${{ env.XINYU_APP_DIR }}"
          --exclude "**/learning/**,**/runtime/**,**/.venv/**,**/ops/archive/**"

  # ── Blocking: curated offline smokes (see docs/plans/QUICK-SMOKE-SET.md) ────
  python-smoke-offline:
    name: "Python smoke offline (blocking)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: XinYu-Core/pyproject.toml
      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./XinYu-Core[dev]"
      - name: Offline smoke scripts
        working-directory: ${{ env.XINYU_APP_DIR }}
        env:
          TZ: Asia/Shanghai
        run: |
          set -euo pipefail
          # Curated hermetic set only (see docs/plans/QUICK-SMOKE-SET.md).
          # Intentionally excluded until cleaned:
          #   mojibake_guard (legacy U+FFFD / mojibake fragments still in tree).
          scripts=(
            tests/smoke/runtime/runtime_security_smoke.py
            tests/smoke/runtime/runtime_presence_smoke.py
            tests/smoke/memory/memory_braid_smoke.py
            tests/smoke/bridge/bridge_renderer_guard_flags_smoke.py
            tests/smoke/bridge/bridge_auth_smoke.py
            tests/smoke/bridge/bridge_values_smoke.py
            tests/smoke/bridge/bridge_session_cleanup_smoke.py
            tests/smoke/codex/self_code_approval_smoke.py
            tests/smoke/codex/codex_delegation_reality_smoke.py
            tests/smoke/codex/self_code_watchdog_smoke.py
            tests/smoke/voice/xinyu_speech_controller_smoke.py
            tests/smoke/voice/persona_realism_eval_smoke.py
            tests/smoke/life/environment_sensor_smoke.py
            tests/smoke/life/life_kernel_smoke.py
            tests/smoke/life/life_kernel_entropy_smoke.py
            tests/smoke/life/life_kernel_self_choice_bias_smoke.py
            tests/smoke/life/xinyu_self_choice_store_smoke.py
            tests/smoke/life/xinyu_dream_engine_smoke.py
            tests/smoke/qq/integration/xinyu_qq_gateway_smoke.py
          )
          for script in "${scripts[@]}"; do
            echo "::group::${script}"
            python "${script}"
            echo "::endgroup::"
          done

  python-smoke:
    name: "Python smoke (informational)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: XinYu-Core/pyproject.toml
      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./XinYu-Core[dev]"
      - name: Run smoke harness
        working-directory: ${{ env.XINYU_APP_DIR }}
        run: python -m pytest -q -m smoke

  # ── Blocking: desktop typecheck + lint ─────────────────────────────────────
  desktop-typecheck:
    name: "Desktop typecheck (blocking)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: XinYu_Desktop/package-lock.json
      - name: Install + typecheck + lint
        working-directory: XinYu_Desktop
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run typecheck
          npm run lint --if-present
