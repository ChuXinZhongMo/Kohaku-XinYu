name: XinYu CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax-and-privacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile tracked XinYu Python files
        run: |
          python - <<'PY'
          import py_compile
          import subprocess
          import sys

          files = subprocess.check_output(
              [
                  "git",
                  "ls-files",
                  "examples/agent-apps/xinyu/*.py",
                  "examples/agent-apps/xinyu/custom/*.py",
                  "examples/agent-apps/xinyu/xinyu_v1/*.py",
                  "examples/agent-apps/xinyu/xinyu_v1/**/*.py",
              ],
              text=True,
          ).splitlines()
          failed = []
          for path in files:
              try:
                  py_compile.compile(path, doraise=True)
              except Exception as exc:
                  failed.append(f"{path}: {exc}")
          if failed:
              print("\n".join(failed))
              sys.exit(1)
          print(f"compiled {len(files)} XinYu Python files")
          PY

      - name: Run dependency-light smoke checks
        working-directory: examples/agent-apps/xinyu
        run: |
          python state_io_smoke.py
          python runtime_security_smoke.py
          python codex_delegation_reality_smoke.py

      - name: Check private runtime files are absent
        run: |
          test ! -f examples/agent-apps/xinyu/xinyu.local.env
          test ! -f examples/agent-apps/xinyu/xinyu_qq_gateway.config.json
          test ! -d examples/agent-apps/xinyu/logs
          test ! -d examples/agent-apps/xinyu/memory
          test ! -d examples/agent-apps/xinyu/runtime
          test -z "$(find examples/agent-apps/xinyu/learning/self_found -type f ! -name .gitkeep -print -quit)"
          test -z "$(find examples/agent-apps/xinyu/learning/owner_supplied -type f ! -name .gitkeep -print -quit)"
