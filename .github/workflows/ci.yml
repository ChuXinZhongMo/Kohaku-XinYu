name: XinYu CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax-and-privacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile XinYu bridge files
        run: |
          python -m py_compile \
            examples/agent-apps/xinyu/xinyu_core_bridge.py \
            examples/agent-apps/xinyu/xinyu_proactive_presence.py \
            examples/agent-apps/xinyu/xinyu_status.py \
            examples/agent-apps/xinyu/xinyu_learning_library.py \
            examples/agent-apps/xinyu/learning_library_smoke.py \
            examples/agent-apps/xinyu/custom/ai_self_iteration_review_bridge_plugin.py

      - name: Run XinYu learning library smoke
        working-directory: examples/agent-apps/xinyu
        run: python learning_library_smoke.py

      - name: Compile AstrBot integration files
        run: |
          python -m py_compile \
            integrations/astrbot/plugins/xinyu_bridge/main.py \
            integrations/astrbot/tools/mock_xinyu_bridge.py \
            integrations/astrbot/tools/xinyu_bridge_proactive_smoke.py

      - name: Check private runtime files are absent
        run: |
          test ! -f examples/agent-apps/xinyu/xinyu.local.env
          test ! -d examples/agent-apps/xinyu/logs
          test ! -d examples/agent-apps/xinyu/memory
          test ! -d integrations/astrbot/data
          test ! -d integrations/astrbot/logs
          test -z "$(find examples/agent-apps/xinyu/learning/self_found -type f ! -name .gitkeep -print -quit)"
          test -z "$(find examples/agent-apps/xinyu/learning/owner_supplied -type f ! -name .gitkeep -print -quit)"
