name: CI

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    shell: bash

env:
  XINYU_APP_DIR: XinYu-Core/examples/agent-apps/xinyu

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./XinYu-Core[dev]"
          pip install pytest-cov
      - name: Run XinYu app test suite
        working-directory: ${{ env.XINYU_APP_DIR }}
        # optional deps (markitdown / torch) are absent -> those tests skip cleanly
        run: python -m pytest -q -m "not smoke" --cov=. --cov-report=term-missing:skip-covered

  python-lint:
    name: Python lint (ruff, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true # expanded ruleset has pre-existing debt; informational for now
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.9.0"
      - run: ruff check XinYu-Core/src ${{ env.XINYU_APP_DIR }}

  python-smoke:
    name: Python smoke scripts (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true # integration smokes may need a live env; informational
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e "./XinYu-Core[dev]"
      - name: Run smoke harness
        working-directory: ${{ env.XINYU_APP_DIR }}
        run: python -m pytest -q -m smoke

  desktop-typecheck:
    name: Desktop typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install + typecheck + lint
        working-directory: XinYu_Desktop
        run: |
          npm install
          npm run typecheck
          npm run lint --if-present
