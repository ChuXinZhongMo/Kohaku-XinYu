name: XinYu Release Guard

on:
  workflow_dispatch:
  push:
    tags: ["xinyu-v*"]

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Explain release policy
        run: |
          echo "XinYu has no automated publishing workflow yet."
          echo "This guard intentionally replaces the upstream KohakuTerrarium release workflow."
          echo "Create release notes manually after local runtime, QQ bridge, and privacy checks pass."
